- hosts: qa
  become: yes
  tasks:
    - name: Install Apache Webserver
      yum:
        name: httpd
        state: present

    - name: Start Apache Webserver
      service:
        name: httpd
        state: started

    - name: Transfer html files
      copy:
        src: index.html
        dest: /var/www/html
        mode: '0777'
